name: Build Alcamp APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout android-app source
        uses: actions/checkout@v4
        with:
          repository: ALCAMP-Stadiums/ALCAMP-
          ref: claude/alcamp-stadium-app-xnct4z

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Build Debug APK
        run: |
          chmod +x android-app/gradlew
          cd android-app
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Alcamp-APK
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
