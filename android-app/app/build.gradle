plugins {
    id 'com.android.application'
}

android {
    namespace 'com.alcamp.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.alcamp.app"
        minSdk 21
        targetSdk 34
        versionCode 146
        versionName "1.46"
    }

    buildTypes {
        release {
            minifyEnabled false
            debuggable false
        }
        debug {
            minifyEnabled false
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
}
